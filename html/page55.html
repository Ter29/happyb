<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наступний етап</title>
    <link rel="stylesheet" href="../css/style55.css">
</head>
<body>
    <div class="mandarin-counter">
        <div class="counter-display" id="counter"></div>
    </div>

    <main class="file-explorer">
        <header class="explorer-header">
            <div>
                <h1>ACCESS SAVED</h1>
                <p id="path-label">/ folder 1</p>
            </div>
            <button class="back-btn" id="back-btn" disabled>Назад</button>
        </header>

        <section class="explorer-grid" id="explorer-grid"></section>
    </main>

    <div class="photo-viewer" id="photo-viewer">
        <div class="photo-window">
            <button class="close-viewer-btn" id="close-viewer-btn">Закрити</button>
            <img src="../img/IMG_20181226_084322.jpg" alt="Фото з папки" id="viewer-photo">
            <div class="text-file-content" id="viewer-text"></div>
            <button class="buy-text-hint-btn is-hidden" id="buy-text-hint-btn">Купити підказку за 1 🍊</button>
            <p id="viewer-caption"></p>
        </div>
    </div>

    <div class="password-modal" id="password-modal">
        <div class="password-window">
            <h2 id="password-title">Введіть пароль</h2>
            <input type="password" id="folder-password-input" placeholder="Пароль">
            <p class="password-error" id="password-error"></p>
            <div class="password-actions">
                <button id="password-cancel-btn">Скасувати</button>
                <button id="password-submit-btn">Відкрити</button>
            </div>
        </div>
    </div>

    <script src="../js/counter.js"></script>
    <script src="../js/page55.js"></script>
</body>
</html>
